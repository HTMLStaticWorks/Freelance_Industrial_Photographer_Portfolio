<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="4" y="20" width="56" height="36" rx="6" ry="6" fill="url(#g)"/>
  <!-- Viewfinder hump -->
  <path d="M18,20 L18,12 Q18,8 22,8 L36,8 Q40,8 40,12 L40,20" fill="url(#g)"/>
  <!-- Lens outer ring (white) -->
  <circle cx="32" cy="38" r="13" fill="white" opacity="0.25"/>
  <!-- Lens ring stroke -->
  <circle cx="32" cy="38" r="12" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Lens inner (filled white) -->
  <circle cx="32" cy="38" r="6" fill="white" opacity="0.9"/>
  <!-- Shutter button -->
  <circle cx="52" cy="18" r="4" fill="white" opacity="0.8"/>
  <!-- Flash indicator -->
  <rect x="8" y="26" width="8" height="5" rx="2" fill="white" opacity="0.6"/>
</svg>
